<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoIQ — Wiygul Automotive Clinic</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --white:#FFFFFF;--surface:#F7F6F4;--panel:#F0EFEC;
  --navy:#1A2B4A;--navy-light:#243554;--navy-hover:#1e3259;
  --accent:#E8401C;--gray:#6B7280;--gray-light:#9CA3AF;
  --gray-dark:#374151;--border:#E5E3DF;
  --green:#16A34A;--green-bg:#DCFCE7;
  --amber:#D97706;--amber-bg:#FEF3C7;
  --red:#DC2626;--red-bg:#FEE2E2;
  --blue:#2563EB;--blue-bg:#DBEAFE;
  --font:'Inter',system-ui,-apple-system,sans-serif;
  --sidebar-width:240px;--header-height:60px;--subheader-height:40px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:var(--panel);color:var(--gray-dark);font-size:13px;line-height:1.5;overflow:hidden;height:100vh;}
.app{display:flex;height:100vh;}

/* SIDEBAR */
.sidebar{width:var(--sidebar-width);min-width:var(--sidebar-width);background:var(--navy);display:flex;flex-direction:column;height:100vh;overflow-y:auto;overflow-x:hidden;z-index:100;}
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);}
.sidebar-brand{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;flex-direction:column;gap:5px;}
.sidebar-brand img{width:148px;height:auto;display:block;}
.sidebar-brand-sub{font-size:9px;color:rgba(255,255,255,0.35);letter-spacing:1.5px;text-transform:uppercase;}
.sidebar-section{padding:14px 16px 4px;font-size:9px;font-weight:700;letter-spacing:1.8px;color:rgba(255,255,255,0.25);text-transform:uppercase;}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 16px;cursor:pointer;color:rgba(255,255,255,0.58);border-left:3px solid transparent;transition:all 0.15s;user-select:none;}
.nav-item:hover{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.88);}
.nav-item.active{background:rgba(232,64,28,0.15);color:#fff;border-left-color:var(--accent);}
.nav-icon{width:15px;height:15px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.nav-icon svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.nav-label-main{display:block;font-size:11.5px;font-weight:600;letter-spacing:0.3px;}
.nav-label-sub{display:block;font-size:9.5px;color:rgba(255,255,255,0.3);margin-top:1px;}
.nav-item.active .nav-label-sub{color:rgba(255,255,255,0.5);}
.nav-badge{background:var(--accent);color:#fff;font-size:9px;font-weight:700;padding:1px 6px;border-radius:8px;margin-left:auto;}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}

/* HEADER */
.header{height:var(--header-height);background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;z-index:50;}
.header-left{display:flex;align-items:center;gap:16px;}
.header-platform{font-size:13px;font-weight:700;color:var(--navy);letter-spacing:0.1px;}
.header-status{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--green);font-weight:500;}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse-green 2.5s infinite;}
@keyframes pulse-green{0%,100%{opacity:1;}50%{opacity:0.4;}}
@keyframes pulse-red{0%,100%{opacity:1;}50%{opacity:0.2;}}
.header-right{display:flex;align-items:center;gap:20px;}
.header-time{font-size:11px;color:var(--gray);font-variant-numeric:tabular-nums;font-weight:500;}
.header-logo{height:32px;width:auto;object-fit:contain;}

/* SUBHEADER */
.subheader{height:var(--subheader-height);background:var(--navy);display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0;}
.subheader-title{font-size:14px;font-weight:800;color:#fff;letter-spacing:4px;}
.subheader-pipe{color:rgba(255,255,255,0.18);}
.subheader-subtitle{font-size:10.5px;color:rgba(255,255,255,0.45);letter-spacing:0.4px;}
.subheader-right{margin-left:auto;display:flex;align-items:center;gap:16px;}
.subheader-stat{font-size:10.5px;color:rgba(255,255,255,0.5);}
.subheader-stat b{color:var(--accent);font-weight:700;}

/* CONTENT */
.content{flex:1;overflow-y:auto;background:var(--panel);}
.content-inner{padding:20px 24px;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--gray-light);}

/* PAGE TITLE */
.page-header{margin-bottom:18px;}
.page-title{font-size:17px;font-weight:800;color:var(--navy);letter-spacing:-0.3px;}
.page-subtitle{font-size:11.5px;color:var(--gray);margin-top:3px;}

/* KPI STRIP */
.kpi-strip{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:18px;}
.kpi-tile{background:var(--white);border-radius:7px;padding:13px 14px;border:1px solid var(--border);position:relative;overflow:hidden;}
.kpi-tile::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--navy);}
.kpi-tile.accent::after{background:var(--accent);}
.kpi-tile.green::after{background:var(--green);}
.kpi-tile.amber::after{background:var(--amber);}
.kpi-label{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.9px;color:var(--gray);margin-bottom:7px;}
.kpi-value{font-size:24px;font-weight:800;color:var(--navy);line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-0.5px;}
.kpi-trend{display:flex;align-items:center;gap:3px;margin-top:7px;font-size:10.5px;font-weight:600;}
.trend-up{color:var(--green);}
.trend-down{color:var(--red);}
.trend-neutral{color:var(--gray);}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:10px;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;}
.bdot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.badge-active{background:var(--green-bg);color:var(--green);}
.badge-active .bdot{background:var(--green);animation:pulse-green 2s infinite;}
.badge-idle{background:var(--amber-bg);color:var(--amber);}
.badge-idle .bdot{background:var(--amber);}
.badge-alert{background:var(--red-bg);color:var(--red);}
.badge-alert .bdot{background:var(--red);animation:pulse-red 1s infinite;}
.badge-offline{background:var(--panel);color:var(--gray-light);border:1px solid var(--border);}
.badge-offline .bdot{background:var(--gray-light);}

/* ADE GRID */
.ade-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;}
.ade-card{background:var(--white);border-radius:7px;padding:13px 14px;border:1px solid var(--border);transition:border-color 0.2s,opacity 0.2s;}
.ade-card:hover{border-color:var(--navy);}
.ade-card.offline{opacity:0.55;}
.ade-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:9px;}
.ade-names{flex:1;min-width:0;}
.ade-codename{font-size:13px;font-weight:800;color:var(--navy);letter-spacing:0.5px;}
.ade-role{font-size:9.5px;color:var(--gray);margin-top:1px;}
.ade-toggle{padding:3px 9px;border-radius:4px;font-size:9.5px;font-weight:700;cursor:pointer;border:1px solid;transition:all 0.15s;white-space:nowrap;font-family:var(--font);}
.ade-toggle.running{background:var(--red-bg);color:var(--red);border-color:var(--red);}
.ade-toggle.running:hover{background:var(--red);color:#fff;}
.ade-toggle.stopped{background:var(--green-bg);color:var(--green);border-color:var(--green);}
.ade-toggle.stopped:hover{background:var(--green);color:#fff;}
.ade-last{font-size:10.5px;color:var(--gray);margin-bottom:10px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:28px;}
.ade-footer{display:flex;gap:14px;}
.ade-stat-item{font-size:9px;color:var(--gray-light);text-transform:uppercase;letter-spacing:0.5px;}
.ade-stat-val{display:block;font-size:15px;font-weight:800;color:var(--navy);line-height:1.2;font-variant-numeric:tabular-nums;}

/* LAYOUT GRIDS */
.two-col{display:grid;grid-template-columns:1fr 336px;gap:14px;}
.three-kpi-row{display:grid;grid-template-columns:1fr 256px;gap:14px;margin-bottom:18px;}

/* SECTION CARD */
.sc{background:var(--white);border-radius:7px;border:1px solid var(--border);overflow:hidden;}
.sc-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--white);}
.sc-title{font-size:10.5px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:1px;}
.sc-meta{font-size:10.5px;color:var(--gray);}

/* FILTER BAR */
.fbar{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border);background:var(--surface);}
.finput{padding:4px 9px;border-radius:4px;border:1px solid var(--border);font-size:11px;font-family:var(--font);background:var(--white);color:var(--gray-dark);width:160px;}
.finput:focus{outline:none;border-color:var(--navy);}
.fselect{padding:4px 8px;border-radius:4px;border:1px solid var(--border);font-size:11px;font-family:var(--font);background:var(--white);color:var(--gray-dark);cursor:pointer;}
.fselect:focus{outline:none;border-color:var(--navy);}

/* TABLE */
.dtw{overflow-x:auto;}
.dt{width:100%;border-collapse:collapse;font-size:11.5px;}
.dt th{padding:8px 12px;text-align:left;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.9px;color:var(--gray);background:var(--surface);border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;}
.dt th:hover{color:var(--navy);}
.dt th.sorted{color:var(--navy);}
.si{margin-left:3px;opacity:0.4;}
.dt th.sorted .si{opacity:1;}
.dt td{padding:9px 12px;border-bottom:1px solid var(--border);color:var(--gray-dark);vertical-align:middle;}
.dt tr:last-child td{border-bottom:none;}
.dt tbody tr{cursor:pointer;transition:background 0.1s;}
.dt tbody tr:hover{background:var(--surface);}
.loc-name{font-weight:700;color:var(--navy);}
.score-hi{color:var(--green);font-weight:700;}
.score-md{color:var(--amber);font-weight:700;}
.score-lo{color:var(--red);font-weight:700;}
.score-pill{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;}
.pill-hi{background:var(--green-bg);color:var(--green);}
.pill-md{background:var(--amber-bg);color:var(--amber);}
.pill-lo{background:var(--red-bg);color:var(--red);}

/* ACTIVITY FEED */
.feed-wrap{height:296px;overflow-y:auto;}
.feed-item{display:flex;gap:8px;padding:7px 14px;border-left:3px solid transparent;transition:background 0.1s;}
.feed-item:hover{background:var(--surface);}
.fi-success{border-left-color:var(--green);}
.fi-alert{border-left-color:var(--red);}
.fi-warning{border-left-color:var(--amber);}
.fi-info{border-left-color:var(--blue);}
.fi-neutral{border-left-color:var(--border);}
.feed-time{font-size:9.5px;color:var(--gray-light);white-space:nowrap;padding-top:2px;min-width:44px;font-variant-numeric:tabular-nums;}
.feed-body{flex:1;min-width:0;}
.feed-ade{display:inline-block;font-size:8.5px;font-weight:700;background:var(--navy);color:#fff;padding:1px 5px;border-radius:3px;letter-spacing:0.5px;margin-right:4px;}
.feed-loc{font-size:9.5px;color:var(--accent);font-weight:600;margin-right:3px;}
.feed-txt{font-size:10.5px;color:var(--gray-dark);line-height:1.4;}

/* ALERT QUEUE */
.alert-list{padding:8px 10px;display:flex;flex-direction:column;gap:7px;max-height:380px;overflow-y:auto;}
.ac{background:var(--white);border:1px solid var(--border);border-radius:5px;padding:9px 11px;border-left:3px solid var(--border);}
.ac.hi{border-left-color:var(--red);}
.ac.md{border-left-color:var(--amber);}
.ac.lo{border-left-color:var(--blue);}
.ac-top{display:flex;align-items:center;gap:5px;margin-bottom:5px;flex-wrap:wrap;}
.asev{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;}
.asev.hi{color:var(--red);}
.asev.md{color:var(--amber);}
.asev.lo{color:var(--blue);}
.atag{font-size:8.5px;font-weight:700;background:var(--navy);color:#fff;padding:1px 5px;border-radius:3px;}
.aloc{font-size:9.5px;color:var(--gray);margin-left:auto;}
.aage{font-size:9px;color:var(--gray-light);}
.amsg{font-size:10.5px;color:var(--gray-dark);line-height:1.4;margin-bottom:7px;}
.abts{display:flex;gap:5px;flex-wrap:wrap;}
.btn-xs{padding:3px 8px;border-radius:4px;font-size:9.5px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--navy);transition:all 0.15s;font-family:var(--font);}
.btn-xs:hover{background:var(--navy);color:#fff;border-color:var(--navy);}
.btn-xs.prim{background:var(--navy);color:#fff;border-color:var(--navy);}
.btn-xs.prim:hover{background:var(--accent);border-color:var(--accent);}
.btn-xs.dang{background:var(--red-bg);color:var(--red);border-color:var(--red);}
.btn-xs.dang:hover{background:var(--red);color:#fff;}

/* CHARTS */
.charts-row{display:grid;grid-template-columns:1fr 240px;gap:12px;margin-bottom:18px;}
.chart-card{background:var(--white);border-radius:7px;border:1px solid var(--border);padding:13px 14px;}
.chart-label{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--navy);margin-bottom:10px;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(26,43,74,0.5);z-index:1000;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--white);border-radius:9px;width:700px;max-width:95vw;max-height:88vh;overflow-y:auto;box-shadow:0 24px 60px rgba(26,43,74,0.28);}
.modal-hd{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--white);z-index:10;}
.modal-ttl{font-size:14px;font-weight:800;color:var(--navy);}
.modal-cls{width:26px;height:26px;border-radius:4px;border:1px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--gray);transition:all 0.15s;}
.modal-cls:hover{background:var(--red-bg);color:var(--red);border-color:var(--red);}
.modal-bd{padding:20px;}
.modal-kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
.modal-kpi{background:var(--surface);border-radius:6px;padding:10px 12px;border:1px solid var(--border);}
.mkpi-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--gray);margin-bottom:5px;}
.mkpi-val{font-size:20px;font-weight:800;color:var(--navy);font-variant-numeric:tabular-nums;}

/* PLACEHOLDER */
.ph{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:70px 40px;text-align:center;}
.ph-icon{width:52px;height:52px;background:var(--surface);border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;color:var(--gray-light);}
.ph-icon svg{width:24px;height:24px;}
.ph-title{font-size:15px;font-weight:800;color:var(--navy);margin-bottom:5px;}
.ph-txt{font-size:11.5px;color:var(--gray);max-width:300px;line-height:1.6;}
.ph-phase{margin-top:14px;display:inline-flex;align-items:center;padding:5px 14px;background:var(--navy);color:#fff;border-radius:20px;font-size:10.5px;font-weight:600;}

/* DIVIDER */
.mb-14{margin-bottom:14px;}
.mb-18{margin-bottom:18px;}

/* ADE MODULE HEADER */
.ade-mod-hdr{background:var(--white);border:1px solid var(--border);border-radius:7px;padding:15px 20px;margin-bottom:16px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
.ade-mod-codename{font-size:22px;font-weight:800;color:var(--navy);letter-spacing:2px;}
.ade-mod-role{font-size:11px;color:var(--gray);margin-top:2px;}
.ade-mod-divider{width:1px;height:36px;background:var(--border);flex-shrink:0;}
.ade-mod-stat{text-align:center;min-width:80px;}
.ade-mod-stat-val{font-size:16px;font-weight:800;color:var(--navy);font-variant-numeric:tabular-nums;display:block;line-height:1.2;}
.ade-mod-stat-lbl{font-size:9px;text-transform:uppercase;letter-spacing:0.8px;color:var(--gray-light);}
.ade-mod-actions{margin-left:auto;display:flex;align-items:center;gap:10px;}

/* 5-COL KPI STRIP */
.kpi-5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px;}

/* ADE 2-COL CONTENT */
.ade-2col{display:grid;grid-template-columns:1fr 318px;gap:14px;}

/* REVIEW QUEUE */
.rq-wrap{max-height:340px;overflow-y:auto;padding:8px 10px;display:flex;flex-direction:column;gap:7px;}
.rq-card{background:var(--white);border:1px solid var(--border);border-radius:6px;padding:10px 12px;}
.rq-card.escalated{border-left:3px solid var(--red);}
.rq-card.pending{border-left:3px solid var(--amber);}
.rq-card.review{border-left:3px solid var(--blue);}
.rq-top{display:flex;align-items:center;gap:6px;margin-bottom:5px;flex-wrap:wrap;}
.rq-id{font-size:10.5px;font-weight:700;color:var(--navy);font-variant-numeric:tabular-nums;}
.rq-typetag{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;padding:1px 6px;border-radius:3px;}
.rq-typetag.escalated{background:var(--red-bg);color:var(--red);}
.rq-typetag.pending{background:var(--amber-bg);color:var(--amber);}
.rq-typetag.review{background:var(--blue-bg);color:var(--blue);}
.rq-age{font-size:9px;color:var(--gray-light);margin-left:auto;}
.rq-cust{font-size:11px;font-weight:700;color:var(--navy);margin-bottom:1px;}
.rq-loc{font-size:10px;color:var(--gray);margin-bottom:5px;}
.rq-detail{font-size:10.5px;color:var(--gray-dark);line-height:1.45;margin-bottom:7px;}
.rq-value{display:inline-block;font-size:10px;font-weight:700;color:var(--green);background:var(--green-bg);padding:1px 6px;border-radius:3px;margin-bottom:6px;}
.rq-acts{display:flex;gap:5px;flex-wrap:wrap;}

/* CONFIG PANEL */
.cfg-toggle{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;user-select:none;background:var(--surface);border-top:1px solid var(--border);}
.cfg-toggle:hover{background:var(--panel);}
.cfg-toggle-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--gray);}
.cfg-chevron{font-size:10px;color:var(--gray-light);transition:transform 0.2s;}
.cfg-body{display:none;padding:14px;border-top:1px solid var(--border);}
.cfg-body.open{display:block;}
.cfg-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px;}
.cfg-field{background:var(--surface);border-radius:5px;padding:8px 10px;border:1px solid var(--border);}
.cfg-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--gray-light);margin-bottom:3px;}
.cfg-val{font-size:11px;font-weight:600;color:var(--navy);}
.cfg-int{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:var(--surface);border-radius:5px;border:1px solid var(--border);margin-bottom:6px;}
.cfg-int-name{font-size:10.5px;font-weight:600;color:var(--navy);}
.cfg-int-ok{font-size:9.5px;font-weight:700;color:var(--green);}
.cfg-int-warn{font-size:9.5px;font-weight:700;color:var(--amber);}

/* PROGRESS BAR */
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.prog-label{font-size:10.5px;font-weight:600;color:var(--navy);width:126px;flex-shrink:0;}
.prog-track{flex:1;height:7px;background:var(--panel);border-radius:4px;overflow:hidden;}
.prog-fill{height:100%;border-radius:4px;transition:width 0.5s;}
.prog-val{font-size:10.5px;font-weight:700;width:30px;text-align:right;flex-shrink:0;}

/* LEADERBOARD */
.lb-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid var(--border);}
.lb-row:last-child{border-bottom:none;}
.lb-rank{width:22px;font-size:10px;font-weight:800;color:var(--navy);text-align:center;flex-shrink:0;}
.lb-name{flex:1;font-size:11px;font-weight:600;color:var(--navy);}
.lb-loc{font-size:10px;color:var(--gray);flex:0 0 auto;}
.lb-score-track{width:64px;height:5px;background:var(--panel);border-radius:3px;overflow:hidden;flex-shrink:0;}
.lb-score-fill{height:100%;border-radius:3px;}
.lb-score-val{width:28px;font-size:11px;font-weight:700;text-align:right;flex-shrink:0;}

/* INSIGHT CARDS */
.insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.insight-card{background:var(--white);border-radius:7px;border:1px solid var(--border);padding:12px 14px;border-left:4px solid var(--border);}
.insight-card.success{border-left-color:var(--green);}
.insight-card.alert{border-left-color:var(--red);}
.insight-card.warning{border-left-color:var(--amber);}
.insight-card.info{border-left-color:var(--blue);}
.insight-title{font-size:11.5px;font-weight:700;color:var(--navy);margin-bottom:5px;}
.insight-detail{font-size:10.5px;color:var(--gray-dark);line-height:1.5;}

/* SETTINGS */
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;}
.settings-panel{background:var(--white);border-radius:7px;border:1px solid var(--border);overflow:hidden;}
.settings-panel-hd{padding:11px 16px;border-bottom:1px solid var(--border);font-size:10px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:1px;background:var(--surface);}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;border-bottom:1px solid var(--border);font-size:11.5px;}
.settings-row:last-child{border-bottom:none;}
.settings-key{color:var(--gray-dark);font-weight:500;}
.settings-val{color:var(--navy);font-weight:600;font-size:11px;text-align:right;}
.settings-tag{font-size:9.5px;font-weight:700;padding:2px 8px;border-radius:10px;}

/* OUTCOME CLASSES */
.out-apptset{background:var(--green-bg);color:var(--green);font-size:9.5px;font-weight:700;padding:2px 6px;border-radius:3px;}
.out-escalated{background:var(--red-bg);color:var(--red);font-size:9.5px;font-weight:700;padding:2px 6px;border-radius:3px;}
.out-booked{color:var(--green);font-weight:700;}
.out-declined{color:var(--red);font-weight:600;}
.out-voicemail{color:var(--gray);font-weight:500;}
.out-pending{color:var(--amber);font-weight:600;}
.out-callback{color:var(--blue);font-weight:600;}
.out-resolved{color:var(--blue);font-weight:600;}
.out-nobooking{color:var(--gray);font-weight:500;}

function activeAdeCount() {
  return Object.values(STATE.adeRunning).filter(Boolean).length;
}

function scorePillHTML(score) {
  const cls = score >= 90 ? 'pill-hi' : score >= 75 ? 'pill-md' : 'pill-lo';
  return `<span class="score-pill ${cls}">${score}</span>`;
}

function trendHTML(val) {
  if (!val) return `<span class="trend-neutral">— vs. last week</span>`;
  const cls  = val > 0 ? 'trend-up' : 'trend-down';
  const arrow = val > 0 ? '▲' : '▼';
  return `<span class="${cls}">${arrow} ${Math.abs(val)}% vs. last week</span>`;
}

function nowTime() {
  return new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

function shortTime() {
  const d = new Date();
  return d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false});
}

function destroyChart(id) {
  if (STATE.charts[id]) { STATE.charts[id].destroy(); delete STATE.charts[id]; }
}

// ═══════════════════════════════════════════════════
//  SIDEBAR BUILD
// ═══════════════════════════════════════════════════
function buildSidebar() {
  let html = '';
  let lastSection = '';
  NAV_ITEMS.forEach(item => {
    if (item.section && item.section !== lastSection) {
      html += `<div class="sidebar-section">${item.section}</div>`;
      lastSection = item.section;
    }
    const active = STATE.module === item.id ? 'active' : '';
    const running = STATE.adeRunning[item.id];
    const badge = (item.id !== 'command' && item.id !== 'settings' && item.id !== 'nexus')
      ? (running === true ? `<span class="nav-badge">ON</span>` : running === false ? '' : '') : '';
    html += `<div class="nav-item ${active}" onclick="navigate('${item.id}')">
      <span class="nav-icon">${ICONS[item.icon]||''}</span>
      <span>
        <span class="nav-label-main">${item.label}</span>
        <span class="nav-label-sub">${item.sub}</span>
      </span>
      ${badge}
    </div>`;
  });
  document.getElementById('sidebar-nav').innerHTML = html;
}

// ═══════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════
function navigate(id) {
  STATE.module = id;
  buildSidebar();
  updateSubheader();
  const el = document.getElementById('content');
  el.innerHTML = '';
  // destroy all charts
  Object.keys(STATE.charts).forEach(k => destroyChart(k));

  if      (id === 'command') renderCommandCenter();
  else if (id === 'vance')   renderVance();
  else if (id === 'scout')   renderScout();
  else if (id === 'shield')  renderShield();
  else if (id === 'prism')   renderPrism();
  else if (id === 'forge')   renderForge();
  else if (id === 'lens')    renderLens();
  else if (id === 'vault')   renderVault();
  else if (id === 'nexus')   renderNexus();
  else if (id === 'atlas')   renderAtlas();
  else if (id === 'settings') renderSettings();
  else renderPlaceholder(id);
}

function updateSubheader() {
  const cnt = activeAdeCount();
  document.getElementById('sub-ades').innerHTML = `<b>${cnt}</b> of 8 ADEs Online`;
  document.getElementById('sub-alerts').innerHTML = `<b>${DATA.alerts.length}</b> Active Alerts`;
}

function toggleADE(id, e) {
  e && e.stopPropagation();
  STATE.adeRunning[id] = !STATE.adeRunning[id];
  const running = STATE.adeRunning[id];

  // Update card
  const card  = document.getElementById(`ade-card-${id}`);
  const badge = document.getElementById(`ade-badge-${id}`);
  const btn   = card ? card.querySelector('.ade-toggle') : null;

  if (card)  card.classList.toggle('offline', !running);
  if (btn)   { btn.className = `ade-toggle ${running ? 'running' : 'stopped'}`; btn.textContent = running ? 'Stop' : 'Start'; }

  if (badge) {
    const ade = DATA.ades.find(a => a.id === id);
    const badgeCls = !running ? 'badge-offline' : ade.status === 'active' ? 'badge-active' : 'badge-idle';
    const badgeLbl = !running ? 'Offline' : ade.status === 'active' ? 'Active' : 'Idle';
    badge.className = `badge ${badgeCls}`;
    badge.innerHTML = `<span class="bdot"></span>${badgeLbl}`;
  }

  // Update KPI tile
  const kpiEl = document.getElementById('ade-online-kpi');
  if (kpiEl) kpiEl.textContent = `${activeAdeCount()} / 8`;

  buildSidebar();
  updateSubheader();
}

// ═══════════════════════════════════════════════════
//  LOCATION SORT
// ═══════════════════════════════════════════════════
function sortedLocations() {
  const { col, dir } = STATE.locSort;
  return [...DATA.locations].sort((a, b) => {
    let va = a[col], vb = b[col];
    if (typeof va === 'string') va = va.toLowerCase(), vb = vb.toLowerCase();
    if (va < vb) return dir === 'asc' ? -1 : 1;
    if (va > vb) return dir === 'asc' ? 1 : -1;
    return 0;
  });
}

function sortLoc(col) {
  if (STATE.locSort.col === col) {
    STATE.locSort.dir = STATE.locSort.dir === 'asc' ? 'desc' : 'asc';
  } else {
    STATE.locSort.col = col;
    STATE.locSort.dir = col === 'name' ? 'asc' : 'desc';
  }
  // Re-render table body only
  const locs = sortedLocations();
  const rows = locs.map(l => {
    const bkRate = ((l.bookings / l.calls) * 100).toFixed(1);
    return `<tr onclick="openLocationModal('${l.id}')">
      <td><span class="loc-name">${l.name}</span></td>
      <td>${l.calls}</td>
      <td>${l.bookings} <span style="color:var(--gray-light);font-size:10px;">(${bkRate}%)</span></td>
      <td>$${l.aro}</td>
      <td>${scorePillHTML(l.mpi)}</td>
      <td>${scorePillHTML(l.techEff)}</td>
      <td>${scorePillHTML(l.score)}</td>
    </tr>`;
  }).join('');
  const tbody = document.getElementById('loc-tbody');
  if (tbody) tbody.innerHTML = rows;

  // Update sort arrows in headers
  const ths = document.querySelectorAll('.dt th');
  ths.forEach(th => {
    const col2 = th.getAttribute('onclick') ? th.getAttribute('onclick').replace("sortLoc('","").replace("')","") : '';
    const si = th.querySelector('.si');
    if (si) {
      if (col2 === STATE.locSort.col) { si.textContent = STATE.locSort.dir === 'asc' ? '↑' : '↓'; si.style.opacity = '1'; th.classList.add('sorted'); }
      else { si.textContent = '↕'; si.style.opacity = '0.4'; th.classList.remove('sorted'); }
    }
  });
}

// ═══════════════════════════════════════════════════
//  ACTIVITY FEED
// ═══════════════════════════════════════════════════
function seedFeed() {
  // Seed with last 8 items in reverse order
  const pool = DATA.feedPool;
  STATE.feedItems = [];
  for (let i = 0; i < 8; i++) {
    const entry = pool[(pool.length - 1 - i) % pool.length];
    const minsAgo = (i * 2) + 1;
    const d = new Date(Date.now() - minsAgo * 60000);
    const t = d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false});
    STATE.feedItems.unshift({ ...entry, time: t });
  }
  renderFeed();
}

function buildFeedHTML() {
  return STATE.feedItems.slice(0, 20).map(f => `
  <div class="feed-item ${f.type}">
    <span class="feed-time">${f.time}</span>
    <div class="feed-body">
      <span class="feed-ade">${f.ade}</span><span class="feed-loc">${f.loc}</span>
      <span class="feed-txt">${f.txt}</span>
    </div>
  </div>`).join('');
}

function renderFeed() {
  const wrap = document.getElementById('feed-wrap');
  if (wrap) { wrap.innerHTML = buildFeedHTML(); wrap.scrollTop = 0; }
}

function pushFeedItem() {
  // Find an ADE that is running
  const runningAdes = Object.entries(STATE.adeRunning).filter(([,v]) => v).map(([k]) => k.toUpperCase());
  const candidates = DATA.feedPool.filter(f => runningAdes.includes(f.ade));
  if (candidates.length === 0) return;
  const entry = candidates[Math.floor(Math.random() * candidates.length)];
  const t = shortTime();
  STATE.feedItems.unshift({ ...entry, time: t });
  if (STATE.feedItems.length > 30) STATE.feedItems.pop();

  // Increment ade today counter
  const adeId = entry.ade.toLowerCase();
  const ade = DATA.ades.find(a => a.id === adeId);
  if (ade) {
    ade.today++;
    ade.last = entry.txt;
    // Update DOM if on command center
    const todayEl = document.getElementById(`ade-today-${adeId}`);
    if (todayEl) todayEl.textContent = ade.today;
    const lastEl = document.getElementById(`ade-last-${adeId}`);
    if (lastEl) lastEl.textContent = ade.last;
  }
  renderFeed();
}

  <div class="ac ${a.sev}" id="alert-${a.id}">
    <div class="ac-top">
      <span class="asev ${a.sev}">${a.sev === 'hi' ? 'HIGH' : a.sev === 'md' ? 'MEDIUM' : 'LOW'}</span>

function handleAlert(id, action) {
  const card = document.getElementById(`alert-${id}`);
  if (card) {
    card.style.transition = 'opacity 0.3s, max-height 0.4s';
    card.style.opacity = '0';
    card.style.maxHeight = '0';
    card.style.overflow = 'hidden';
    card.style.padding = '0';
    card.style.margin = '0';
    setTimeout(() => { card.remove(); }, 400);
  }
  const idx = DATA.alerts.findIndex(a => a.id === id);
  if (idx >= 0) DATA.alerts.splice(idx, 1);
  updateSubheader();
  // Update count badge
  const hdr = document.querySelector('.sc-meta[style*="red"]');
  if (hdr && DATA.alerts.length > 0) hdr.textContent = `${DATA.alerts.length} Pending`;
  else if (hdr) hdr.textContent = 'All Clear';
}

function filterAndSort(arr, sortState, textFilter, outcomeFilter, outcomeKey) {
  let r = [...arr];
  if (textFilter) { const f = textFilter.toLowerCase(); r = r.filter(c => c.cust.toLowerCase().includes(f) || c.loc.toLowerCase().includes(f)); }
  if (outcomeFilter && outcomeKey) r = r.filter(c => c[outcomeKey] === outcomeFilter);
  return r.sort((a, b) => {
    let va = a[sortState.col], vb = b[sortState.col];
    if (va == null && vb == null) return 0;
    if (va == null) return 1;
    if (vb == null) return -1;
    if (typeof va === 'string' || typeof vb === 'string') { va = String(va).toLowerCase(); vb = String(vb).toLowerCase(); }
    return va < vb ? (sortState.dir==='asc' ? -1 : 1) : va > vb ? (sortState.dir==='asc' ? 1 : -1) : 0;
  });
}

function filterAndSortShield(arr, sortState, textFilter, outcomeFilter) {
  let r = [...arr];
  if (textFilter) { const f = textFilter.toLowerCase(); r = r.filter(o => o.cust.toLowerCase().includes(f) || o.loc.toLowerCase().includes(f)); }
  if (outcomeFilter) r = r.filter(o => o.outcome === outcomeFilter);
  return r.sort((a, b) => {
    let va = a[sortState.col], vb = b[sortState.col];
    if (va == null && vb == null) return 0;
    if (va == null) return 1;
    if (vb == null) return -1;
    if (typeof va === 'string' || typeof vb === 'string') { va = String(va).toLowerCase(); vb = String(vb).toLowerCase(); }
    return va < vb ? (sortState.dir==='asc' ? -1 : 1) : va > vb ? (sortState.dir==='asc' ? 1 : -1) : 0;
  });
}

function buildShieldRows(ops) {
  if (!ops.length) return `<tr><td colspan="8" style="text-align:center;color:var(--gray-light);padding:20px">No opportunities match filter</td></tr>`;
  return ops.map(o => {
    const out = o.outcome==='Recovered' ? `<span class="out-apptset">&#10003; Recovered</span>`
              : o.outcome==='Declined'  ? `<span class="out-declined">Declined</span>`
              : o.outcome==='Escalated' ? `<span class="out-escalated">&#8593; Escalated</span>`
              : `<span class="out-pending">Pending</span>`;
    const st = o.status==='Recovery Call Made' ? `<span style="color:var(--blue);font-weight:600;">Call Made</span>`
             : o.status==='Abandoned'           ? `<span style="color:var(--red);font-weight:600;">Abandoned</span>`
             : `<span style="color:var(--amber);font-weight:600;">Pending</span>`;
    return `<tr onclick="openShieldModal('${o.id}')">
      <td style="font-weight:700;color:var(--navy);font-variant-numeric:tabular-nums">${o.id}</td>
      <td style="font-variant-numeric:tabular-nums;color:var(--gray)">${o.time}</td>
      <td style="font-weight:500">${o.loc}</td>
      <td style="font-weight:600">${o.cust}</td>
      <td style="color:var(--gray-dark)">${o.service}</td>
      <td style="font-weight:700;color:var(--navy)">$${o.lostVal}</td>
      <td>${st}</td><td>${out}</td>
    </tr>`;
  }).join('');
}

function filterAndSortPrism(arr, sortState, textFilter, typeFilter) {
  let r = [...arr];
  if (textFilter) { const f = textFilter.toLowerCase(); r = r.filter(c => c.emp.toLowerCase().includes(f) || c.loc.toLowerCase().includes(f)); }
  if (typeFilter) r = r.filter(c => c.type === typeFilter);
  return r.sort((a, b) => {
    let va = a[sortState.col], vb = b[sortState.col];
    if (va == null && vb == null) return 0;
    if (va == null) return 1;
    if (vb == null) return -1;
    if (typeof va === 'string' || typeof vb === 'string') { va = String(va).toLowerCase(); vb = String(vb).toLowerCase(); }
    return va < vb ? (sortState.dir==='asc' ? -1 : 1) : va > vb ? (sortState.dir==='asc' ? 1 : -1) : 0;
  });
}

function buildPrismRows(scores) {
  if (!scores.length) return `<tr><td colspan="9" style="text-align:center;color:var(--gray-light);padding:20px">No calls match filter</td></tr>`;
  return scores.map(c => {
    const empCell = c.adeTag
      ? `<span style="font-weight:700;color:var(--navy)">${c.emp}</span> <span style="font-size:8px;background:var(--navy);color:#fff;padding:1px 4px;border-radius:3px;letter-spacing:0.5px;">${c.adeTag}</span>`
      : `<span style="font-weight:600">${c.emp}</span>`;
    const typeBadge = c.type==='In' ? `<span style="color:var(--blue);font-weight:600;font-size:10px">In</span>` : `<span style="color:var(--gray);font-weight:600;font-size:10px">Out</span>`;
    const scoreCell = c.overall>=80 ? `<span class="score-pill pill-hi">${c.overall}</span>` : c.overall>=65 ? `<span class="score-pill pill-md">${c.overall}</span>` : `<span class="score-pill pill-lo">${c.overall}</span>`;
    const dim = v => v>=80 ? `<span style="color:var(--green);font-weight:700">${v}</span>` : v>=65 ? `<span style="color:var(--amber);font-weight:700">${v}</span>` : `<span style="color:var(--red);font-weight:700">${v}</span>`;
    return `<tr onclick="openPrismModal('${c.id}')">
      <td style="font-weight:700;color:var(--navy);font-variant-numeric:tabular-nums">${c.id}</td>
      <td style="font-variant-numeric:tabular-nums;color:var(--gray)">${c.time}</td>
      <td>${empCell}</td>
      <td style="font-weight:500">${c.loc}</td>
      <td>${typeBadge}</td>
      <td>${dim(c.salesEff)}</td>
      <td>${dim(c.empathy)}</td>
      <td>${dim(c.script)}</td>
      <td>${scoreCell}</td>
    </tr>`;
  }).join('');
}

function dismissPCRQ(id) {
  const el = document.getElementById(`pcrq-${id}`);
  if (el) { el.style.cssText+=';opacity:0;max-height:0;overflow:hidden;padding:0;margin:0;transition:all 0.3s'; setTimeout(()=>el.remove(),300); }
  const i = DATA.prismReview.findIndex(r=>r.id===id); if(i>=0) DATA.prismReview.splice(i,1);
  const cnt = document.getElementById('pcrq-count'); if(cnt) cnt.textContent = DATA.prismReview.length ? `${DATA.prismReview.length} Flagged` : 'All Clear';

function buildLeaderboard() {
  const humanScores = DATA.prismScores.filter(c => !c.adeTag);
  const byEmp = {};
  humanScores.forEach(c => {
    if (!byEmp[c.emp]) byEmp[c.emp] = { emp:c.emp, loc:c.loc, scores:[] };
    byEmp[c.emp].scores.push(c.overall);
  });
  const leaders = Object.values(byEmp)
    .map(e => ({ emp:e.emp, loc:e.loc, avg:Math.round(e.scores.reduce((s,v)=>s+v,0)/e.scores.length) }))
    .sort((a,b) => b.avg - a.avg).slice(0, 5);
  const medals = ['#1','#2','#3','#4','#5'];
  return leaders.map((l, i) => {
    const fillColor = l.avg>=80 ? 'var(--green)' : l.avg>=65 ? 'var(--amber)' : 'var(--red)';
    return `<div class="lb-row">
      <span class="lb-rank">${medals[i]}</span>
      <span class="lb-name">${l.emp}</span>
      <span class="lb-loc">${l.loc}</span>
      <div class="lb-score-track"><div class="lb-score-fill" style="width:${l.avg}%;background:${fillColor}"></div></div>
      <span class="lb-score-val" style="color:${fillColor}">${l.avg}</span>
    </div>`;
  }).join('');
}

function initPrismChart() {
  const ctx = document.getElementById('chart-prism-dist'); if(!ctx) return;
  const scoresArr = DATA.prismScores.map(c => c.overall);
  const bins = [0,0,0,0,0,0];
  scoresArr.forEach(s => {
    if      (s < 50) bins[0]++;
    else if (s < 60) bins[1]++;
    else if (s < 70) bins[2]++;
    else if (s < 80) bins[3]++;
    else if (s < 90) bins[4]++;
    else             bins[5]++;
  });
  STATE.charts['prism-dist'] = new Chart(ctx, {
    type: 'bar',
    data: { labels:['0–49','50–59','60–69','70–79','80–89','90–100'], datasets:[{ data:bins, backgroundColor:['#DC2626','#DC2626','#D97706','#D97706','#16A34A','#16A34A'], borderRadius:3 }] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false} }, scales:{ x:{ticks:{font:{family:'Inter',size:9}},grid:{display:false}}, y:{ticks:{font:{family:'Inter',size:9},stepSize:1},grid:{color:'#F0EFEC'}} } }
  });
}

function filterAndSortLens(arr, sortState, textFilter, statusFilter) {
  let r = [...arr];
  if (textFilter) { const f = textFilter.toLowerCase(); r = r.filter(o => o.advisor.toLowerCase().includes(f) || o.loc.toLowerCase().includes(f)); }
  if (statusFilter) r = r.filter(o => o.status === statusFilter);
  return r.sort((a, b) => {
    let va = a[sortState.col], vb = b[sortState.col];
    if (va == null && vb == null) return 0;
    if (va == null) return 1;
    if (vb == null) return -1;
    if (typeof va === 'string' || typeof vb === 'string') { va = String(va).toLowerCase(); vb = String(vb).toLowerCase(); }
    return va < vb ? (sortState.dir==='asc' ? -1 : 1) : va > vb ? (sortState.dir==='asc' ? 1 : -1) : 0;
  });
}

function buildLensRows(ros) {
  if (!ros.length) return `<tr><td colspan="8" style="text-align:center;color:var(--gray-light);padding:20px">No repair orders match filter</td></tr>`;

    const st = r.status==='Accepted' ? `<span class="out-apptset">&#10003; Accepted</span>`
             : r.status==='Partial'  ? `<span class="out-pending">Partial</span>`
             : `<span class="out-declined">Declined</span>`;
    const recColor = r.recs >= 6 ? 'var(--red)' : r.recs >= 4 ? 'var(--amber)' : 'var(--gray-dark)';
    return `<tr onclick="openLensModal('${r.id}')">
      <td style="font-weight:700;color:var(--navy)">${r.id}</td>

      <td style="font-weight:700;color:var(--navy)">$${r.estVal.toLocaleString()}</td>
      <td>${st}</td>
    </tr>`;
  }).join('');
}

function filterAndSortVault(arr, sortState, textFilter, categoryFilter, statusFilter) {
  let r = [...arr];
  if (textFilter) { const f=textFilter.toLowerCase(); r=r.filter(i=>i.desc.toLowerCase().includes(f)||i.id.toLowerCase().includes(f)); }
  if (categoryFilter) r = r.filter(i => i.category === categoryFilter);
  if (statusFilter)   r = r.filter(i => i.status   === statusFilter);
  return r.sort((a, b) => {
    let va=a[sortState.col], vb=b[sortState.col];
    if(va==null&&vb==null) return 0; if(va==null) return 1; if(vb==null) return -1;
    if(typeof va==='string'||typeof vb==='string'){va=String(va).toLowerCase();vb=String(vb).toLowerCase();}
    return va<vb?(sortState.dir==='asc'?-1:1):va>vb?(sortState.dir==='asc'?1:-1):0;
  });
}

function buildVaultRows(items) {
  if (!items.length) return `<tr><td colspan="7" style="text-align:center;color:var(--gray-light);padding:20px">No items match filter</td></tr>`;
  return items.map(i => {
    const stColor = i.status==='Healthy'?'var(--green)':i.status==='Low'?'var(--amber)':i.status==='Critical'?'var(--red)':i.status==='Dead Stock'?'var(--gray)':'var(--blue)';
    const stBg    = i.status==='Healthy'?'var(--green-bg)':i.status==='Low'?'var(--amber-bg)':i.status==='Critical'?'var(--red-bg)':i.status==='Dead Stock'?'var(--panel)':'var(--blue-bg)';
    const sc = i.stock<=i.minLevel*0.5?'var(--red)':i.stock<i.minLevel?'var(--amber)':'var(--gray-dark)';
    return `<tr onclick="openVaultModal('${i.id}')">
      <td style="font-weight:700;color:var(--navy);font-size:10px">${i.id}</td>
      <td style="font-weight:600">${i.desc}</td>
      <td style="color:var(--gray);font-size:11px">${i.category}</td>
      <td style="font-weight:700;color:${sc}">${i.stock}</td>
      <td style="color:var(--gray)">${i.minLevel}</td>
      <td><span style="font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:10px;background:${stBg};color:${stColor}">${i.status}</span></td>
      <td style="color:var(--gray);font-size:11px">${i.lastReorder}</td>
    </tr>`;
  }).join('');
}

function sortVault(col) {
  STATE.vaultSort={col,dir:STATE.vaultSort.col===col&&STATE.vaultSort.dir==='desc'?'asc':'desc'};
  const tb=document.getElementById('vault-tbody'); if(tb) tb.innerHTML=buildVaultRows(filterAndSortVault(DATA.vaultItems,STATE.vaultSort,STATE.vaultFilter,STATE.vaultCategory,STATE.vaultStatus));
}

function buildVaultReview() {
  if (!DATA.vaultReview.length) return `<div style="padding:20px;text-align:center;color:var(--gray-light);font-size:11px">No pending items — all clear</div>`;
  return DATA.vaultReview.map(r => `
  <div class="rq-card ${r.type}" id="vtrq-${r.id}">
    <div class="rq-top"><span class="rq-id">${r.id}</span><span class="rq-typetag ${r.type}">${r.type.charAt(0).toUpperCase()+r.type.slice(1)}</span><span class="rq-age">${r.age}</span></div>

function dismissVTRQ(id) {
  const el=document.getElementById(`vtrq-${id}`);
  if(el){el.style.cssText+=';opacity:0;max-height:0;overflow:hidden;padding:0;margin:0;transition:all 0.3s';setTimeout(()=>el.remove(),300);}
  const i=DATA.vaultReview.findIndex(r=>r.id===id);if(i>=0)DATA.vaultReview.splice(i,1);
  const cnt=document.getElementById('vtrq-count');if(cnt)cnt.textContent=DATA.vaultReview.length?`${DATA.vaultReview.length} Items`:'All Clear';
}

      <span class="prog-label">Stock Level</span>
      <div class="prog-track" style="height:10px"><div class="prog-fill" style="width:${pct}%;background:${fillColor}"></div></div>

function filterAndSortAtlas(arr, sortState, textFilter, statusFilter) {
  let r=[...arr];
  if(textFilter){const f=textFilter.toLowerCase();r=r.filter(s=>s.name.toLowerCase().includes(f)||s.loc.toLowerCase().includes(f));}
  if(statusFilter) r=r.filter(s=>s.status===statusFilter);
  return r.sort((a,b)=>{
    let va=a[sortState.col],vb=b[sortState.col];
    if(va==null&&vb==null)return 0;if(va==null)return 1;if(vb==null)return -1;
    if(typeof va==='string'||typeof vb==='string'){va=String(va).toLowerCase();vb=String(vb).toLowerCase();}
    return va<vb?(sortState.dir==='asc'?-1:1):va>vb?(sortState.dir==='asc'?1:-1):0;
  });
}

function buildAtlasRows(staff) {
  if(!staff.length) return `<tr><td colspan="6" style="text-align:center;color:var(--gray-light);padding:20px">No staff members match filter</td></tr>`;
  return staff.map(s=>{
    const stColor=s.status==='Compliant'?'var(--green)':s.status==='Expiring'?'var(--amber)':'var(--red)';
    const stBg   =s.status==='Compliant'?'var(--green-bg)':s.status==='Expiring'?'var(--amber-bg)':'var(--red-bg)';
    return `<tr onclick="openAtlasModal('${s.id}')">
      <td style="font-weight:700;color:var(--navy)">${s.name}</td>
      <td style="font-weight:500">${s.loc}</td>
      <td style="color:var(--gray)">${s.role}</td>
      <td style="color:var(--gray-dark);font-size:10.5px">${s.certs}</td>
      <td style="color:${s.status==='Compliant'?'var(--gray)':'var(--amber)'};font-weight:${s.status==='Compliant'?'400':'600'}">${s.expiry}</td>
      <td><span style="font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:10px;background:${stBg};color:${stColor}">${s.status}</span></td>
    </tr>`;
  }).join('');
}

function sortAtlas(col){
  STATE.atlasSort={col,dir:STATE.atlasSort.col===col&&STATE.atlasSort.dir==='desc'?'asc':'desc'};
  const tb=document.getElementById('atlas-tbody');if(tb)tb.innerHTML=buildAtlasRows(filterAndSortAtlas(DATA.atlasStaff,STATE.atlasSort,STATE.atlasFilter,STATE.atlasStatus));
}
function atlasFilter(v){STATE.atlasFilter=v;const tb=document.getElementById('atlas-tbody');if(tb)tb.innerHTML=buildAtlasRows(filterAndSortAtlas(DATA.atlasStaff,STATE.atlasSort,v,STATE.atlasStatus));}
function atlasStatusFilter(v){STATE.atlasStatus=v;const tb=document.getElementById('atlas-tbody');if(tb)tb.innerHTML=buildAtlasRows(filterAndSortAtlas(DATA.atlasStaff,STATE.atlasSort,STATE.atlasFilter,v));}

function buildAtlasReview() {
  if(!DATA.atlasReview.length) return `<div style="padding:20px;text-align:center;color:var(--gray-light);font-size:11px">No pending items — all clear</div>`;
  return DATA.atlasReview.map(r=>`
  <div class="rq-card ${r.type}" id="atrq-${r.id}">
    <div class="rq-top"><span class="rq-id">${r.id}</span><span class="rq-typetag ${r.type}">${r.type.charAt(0).toUpperCase()+r.type.slice(1)}</span><span class="rq-age">${r.age}</span></div>
    <div class="rq-cust">${r.name}</div><div class="rq-loc">${r.loc}</div>
    <div class="rq-detail">${r.detail}</div>
    <div class="rq-acts">${r.acts.map((a,i)=>`<button class="btn-xs ${i===0?'prim':''}" onclick="dismissATRQ('${r.id}')">${a}</button>`).join('')}</div>
  </div>`).join('');
}

function dismissATRQ(id){
  const el=document.getElementById(`atrq-${id}`);
  if(el){el.style.cssText+=';opacity:0;max-height:0;overflow:hidden;padding:0;margin:0;transition:all 0.3s';setTimeout(()=>el.remove(),300);}
  const i=DATA.atlasReview.findIndex(r=>r.id===id);if(i>=0)DATA.atlasReview.splice(i,1);
  const cnt=document.getElementById('atrq-count');if(cnt)cnt.textContent=DATA.atlasReview.length?`${DATA.atlasReview.length} Items`:'All Clear';
}

function initAtlasChart(){
  const ctx=document.getElementById('chart-atlas-comp');if(!ctx)return;
  const staff=DATA.atlasStaff;
  STATE.charts['atlas-comp']=new Chart(ctx,{
    type:'doughnut',
    data:{labels:['Compliant','Expiring Soon','Non-Compliant'],datasets:[{data:[staff.filter(s=>s.status==='Compliant').length,staff.filter(s=>s.status==='Expiring').length,staff.filter(s=>s.status==='Non-Compliant').length],backgroundColor:['#16A34A','#D97706','#DC2626'],borderWidth:0,hoverOffset:4}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{position:'right',labels:{font:{family:'Inter',size:9},boxWidth:10,padding:8}}}}
  });
}

function renderPlaceholder(id) {
  const item = NAV_ITEMS.find(n => n.id === id);

  const ade = DATA.ades.find(a => a.id === id);
  const running = STATE.adeRunning[id];

  let statusBanner = '';
  if (ade) {
    const badgeCls = !running ? 'badge-offline' : ade.status === 'active' ? 'badge-active' : 'badge-idle';
    const badgeLbl = !running ? 'Offline' : ade.status === 'active' ? 'Active' : 'Idle';

    const btnLbl   = running ? 'Stop ADE' : 'Start ADE';

      <span class="badge ${badgeCls}"><span class="bdot"></span>${badgeLbl}</span>

  }

  document.getElementById('content').innerHTML = `

  </div>

function toggleADEPlaceholder(id) {
  STATE.adeRunning[id] = !STATE.adeRunning[id];
  const running = STATE.adeRunning[id];
  const btn = document.getElementById(`ph-btn-${id}`);
  const ade = DATA.ades.find(a => a.id === id);
  if (btn) {
    btn.className = `ade-toggle ${running ? 'running' : 'stopped'}`;
    btn.textContent = running ? 'Stop ADE' : 'Start ADE';
  }
  // Update the badge next to the button
  const badges = document.querySelectorAll(`#ph-btn-${id}`);
  buildSidebar();
  updateSubheader();
}
